<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang-On Signal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    
    .logo { font-size: 24px; }
    .brand { font-size: 18px; font-weight: 700; color: #f0b429; }
    .card {
      background: #1a2634;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #243447;
    }
    .signal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .symbol { font-size: 22px; font-weight: 700; color: #ffffff; }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-intraday { background: #1a3a5c; color: #4da6ff; }
    .badge-swing    { background: #1a3a2a; color: #4dff91; }
    .badge-position { background: #3a1a2a; color: #ff4d91; }
    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .score-label { font-size: 12px; color: #8899aa; }
    .score-value { font-size: 14px; font-weight: 700; color: #f0b429; }
    .divider { height: 1px; background: #243447; margin: 16px 0; }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }
    .row-label { font-size: 13px; color: #8899aa; }
    .row-value { font-size: 13px; font-weight: 600; color: #ffffff; }
    .row-value.green  { color: #2ecc71; }
    .row-value.red    { color: #e74c3c; }
    .row-value.gold   { color: #f0b429; }
    .section-title {
      font-size: 11px;
      color: #8899aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .not-registered {
      text-align: center;
      padding: 20px;
    }
    .not-registered p { color: #8899aa; font-size: 14px; margin-bottom: 16px; }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }
    .btn:active { opacity: 0.8; }
    .btn-take   { background: #2ecc71; color: #0f1923; }
    .btn-skip   { background: #243447; color: #8899aa; }
    .btn-register { background: #f0b429; color: #0f1923; }
    .btn-disabled { background: #243447; color: #3a4f63; cursor: not-allowed; }
    .status {
      text-align: center;
      font-size: 13px;
      padding: 12px;
      border-radius: 10px;
      margin-top: 8px;
    }
    .status.success { background: #1a3a2a; color: #2ecc71; }
    .status.error   { background: #3a1a1a; color: #e74c3c; }
    .status.info    { background: #1a2634; color: #8899aa; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 40px; color: #8899aa; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔔</div>
    <div class="brand">Bang-On</div>
  </div>

  <div class="loading" id="loadingScreen">Loading signal...</div>

  <!-- SIGNAL + POSITION SCREEN -->
  <div class="hidden" id="mainScreen">

    <!-- Signal Details -->
    <div class="card">
      <div class="signal-header">
        <div class="symbol" id="signalSymbol">—</div>
        <div class="badge" id="signalBadge">—</div>
      </div>
      <div class="score-row">
        <span class="score-label">Signal Score</span>
        <span class="score-value" id="signalScore">—</span>
      </div>
      <div class="divider"></div>
      <div class="section-title">Signal Levels</div>
      <div class="row">
        <span class="row-label">Entry</span>
        <span class="row-value" id="signalEntry">—</span>
      </div>
      <div class="row">
        <span class="row-label">Stop Loss</span>
        <span class="row-value red" id="signalSL">—</span>
      </div>
      <div class="row">
        <span class="row-label">Target 1</span>
        <span class="row-value green" id="signalT1">—</span>
      </div>
      <div class="row" id="t2Row">
        <span class="row-label">Target 2</span>
        <span class="row-value green" id="signalT2">—</span>
      </div>
    </div>

    <!-- Position Sizing -->
    <div class="card" id="positionCard">
      <div class="section-title">Your Position</div>

      <!-- Not registered -->
      <div class="not-registered hidden" id="notRegistered">
        <p>You haven't registered your capital yet.</p>
        <button class="btn btn-register" onclick="goToRegister()">
          Set Up My Capital →
        </button>
      </div>

      <!-- Registered -->
      <div id="positionDetails">
        <div class="row">
          <span class="row-label">Your Capital</span>
          <span class="row-value gold" id="posCapital">—</span>
        </div>
        <div class="row">
          <span class="row-label">Risk Amount (1%)</span>
          <span class="row-value" id="posRisk">—</span>
        </div>
        <div class="row">
          <span class="row-label">Position Size</span>
          <span class="row-value gold" id="posShares">—</span>
        </div>
        <div class="row">
          <span class="row-label">Capital Required</span>
          <span class="row-value" id="posRequired">—</span>
        </div>
        <div class="row">
          <span class="row-label">Capital Available</span>
          <span class="row-value green" id="posAvailable">—</span>
        </div>

        <div class="divider"></div>

        <button class="btn btn-take" id="takeBtn" onclick="logAction('TAKE')">
          ✅ TAKE this Trade
        </button>
        <button class="btn btn-skip" id="skipBtn" onclick="logAction('SKIP')">
          ❌ SKIP this Trade
        </button>

        <div class="status hidden" id="actionStatus"></div>
      </div>
    </div>

  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwCobqPswnljz2MLL7v1qyBbNQv5nr8zhc9IiEWniUvLbHMNu4kkWQaG9-nnFSbvLl66A/exec';
    const tg          = window.Telegram.WebApp;
    tg.expand();

    const user   = tg.initDataUnsafe?.user;
    const userID = user?.id ? String(user.id) : 'test_user';
    const name   = ((user?.first_name || 'Trader') + ' ' + (user?.last_name || '')).trim();

    // ── Read signal params from URL ────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const signal  = {
      id:     params.get('id')    || 'TEST',
      symbol: params.get('sym')   || 'RELIANCE',
      tf:     params.get('tf')    || 'INTRADAY',
      entry:  parseFloat(params.get('entry') || '1450'),
      sl:     parseFloat(params.get('sl')    || '1430'),
      t1:     parseFloat(params.get('t1')    || '1480'),
      t2:     parseFloat(params.get('t2')    || '0'),
      score:  params.get('score') || '82'
    };

    let userCapital = 0;

    // ── Load everything on start ───────────────────────────
    window.onload = function () {
      renderSignal();
      fetch(WEB_APP_URL + '?action=getUser&userID=' + encodeURIComponent(userID))
        .then(r => r.json())
        .then(data => {
          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('mainScreen').classList.remove('hidden');
          if (data.found) {
            userCapital = Number(data.capital);
            renderPosition(userCapital);
          } else {
            document.getElementById('positionDetails').classList.add('hidden');
            document.getElementById('notRegistered').classList.remove('hidden');
          }
        })
        .catch(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('mainScreen').classList.remove('hidden');
          document.getElementById('positionDetails').classList.add('hidden');
          document.getElementById('notRegistered').classList.remove('hidden');
        });
    };

    // ── Render signal details ──────────────────────────────
    function renderSignal() {
      document.getElementById('signalSymbol').textContent = signal.symbol;
      document.getElementById('signalScore').textContent  = signal.score + ' / 100';
      document.getElementById('signalEntry').textContent  = '₹' + signal.entry.toLocaleString('en-IN');
      document.getElementById('signalSL').textContent     = '₹' + signal.sl.toLocaleString('en-IN');
      document.getElementById('signalT1').textContent     = '₹' + signal.t1.toLocaleString('en-IN');

      if (signal.t2 > 0) {
        document.getElementById('signalT2').textContent = '₹' + signal.t2.toLocaleString('en-IN');
      } else {
        document.getElementById('t2Row').classList.add('hidden');
      }

      const badge = document.getElementById('signalBadge');
      badge.textContent = signal.tf;
      if (signal.tf === 'INTRADAY') badge.className = 'badge badge-intraday';
      else if (signal.tf === 'SWING') badge.className = 'badge badge-swing';
      else badge.className = 'badge badge-position';
    }

    // ── Render position sizing ─────────────────────────────
    function renderPosition(capital) {
      const riskAmt  = Math.round(capital * 0.01);
      const riskPerShare = signal.entry - signal.sl;
      const shares   = riskPerShare > 0 ? Math.floor(riskAmt / riskPerShare) : 0;
      const required = Math.round(shares * signal.entry);
      const adequate = capital >= required;

      document.getElementById('posCapital').textContent  = '₹' + capital.toLocaleString('en-IN');
      document.getElementById('posRisk').textContent     = '₹' + riskAmt.toLocaleString('en-IN');
      document.getElementById('posShares').textContent   = shares + ' shares';
      document.getElementById('posRequired').textContent = '₹' + required.toLocaleString('en-IN');
      document.getElementById('posAvailable').textContent = adequate ? '✅ Sufficient' : '⚠️ Insufficient';
      document.getElementById('posAvailable').className  = adequate ? 'row-value green' : 'row-value red';

      if (!adequate) {
        const takeBtn = document.getElementById('takeBtn');
        takeBtn.className   = 'btn btn-disabled';
        takeBtn.disabled    = true;
        takeBtn.textContent = '✅ TAKE (Insufficient Capital)';
      }
    }

    // ── Log TAKE or SKIP ───────────────────────────────────
    function logAction(action) {
      const riskAmt      = Math.round(userCapital * 0.01);
      const riskPerShare = signal.entry - signal.sl;
      const shares       = riskPerShare > 0 ? Math.floor(riskAmt / riskPerShare) : 0;
      const required     = Math.round(shares * signal.entry);

      document.getElementById('takeBtn').disabled = true;
      document.getElementById('skipBtn').disabled = true;

      const url = WEB_APP_URL
        + '?action=logAction'
        + '&userID='   + encodeURIComponent(userID)
        + '&name='     + encodeURIComponent(name)
        + '&signalID=' + encodeURIComponent(signal.id)
        + '&symbol='   + encodeURIComponent(signal.symbol)
        + '&tf='       + encodeURIComponent(signal.tf)
        + '&act='      + action
        + '&shares='   + shares
        + '&capReq='   + required;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('actionStatus');
          el.classList.remove('hidden');
          if (data.success) {
            el.className   = 'status success';
            el.textContent = action === 'TAKE'
              ? '✅ Trade logged! Good luck with ' + signal.symbol + '!'
              : '❌ Skipped. Better luck on the next signal!';
          } else {
            el.className   = 'status error';
            el.textContent = 'Something went wrong. Please try again.';
            document.getElementById('takeBtn').disabled = false;
            document.getElementById('skipBtn').disabled = false;
          }
        })
        .catch(() => {
          const el = document.getElementById('actionStatus');
          el.classList.remove('hidden');
          el.className   = 'status error';
          el.textContent = 'Connection error. Please try again.';
          document.getElementById('takeBtn').disabled = false;
          document.getElementById('skipBtn').disabled = false;
        });
    }

    function goToRegister() {
      window.location.href = 'https://bullishgopz.github.io/bangon-app/';
    }
  </script>
</body>
</html>
