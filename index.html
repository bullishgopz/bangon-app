<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang-On Personal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: #f0b429;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 13px;
      color: #8899aa;
      margin-bottom: 40px;
    }

    .card {
      background: #1a2634;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      border: 1px solid #243447;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: #8899aa;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-label {
      font-size: 12px;
      color: #8899aa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .rupee {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #f0b429;
      font-size: 18px;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: #0f1923;
      border: 1px solid #243447;
      border-radius: 10px;
      padding: 14px 14px 14px 36px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #f0b429; }

    input::placeholder { color: #3a4f63; font-weight: 400; }

    .risk-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1923;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 24px;
    }

    .risk-label { font-size: 13px; color: #8899aa; }
    .risk-value { font-size: 13px; color: #f0b429; font-weight: 600; }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: #f0b429;
      color: #0f1923;
    }

    .btn-disabled {
      background: #243447;
      color: #3a4f63;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #8899aa;
      min-height: 20px;
    }

    .status.success { color: #2ecc71; }
    .status.error   { color: #e74c3c; }

    .welcome-card {
      background: #1a2634;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      border: 1px solid #243447;
      text-align: center;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #243447;
    }

    .stat-row:last-of-type { border-bottom: none; }
    .stat-label { font-size: 13px; color: #8899aa; }
    .stat-value { font-size: 13px; color: #ffffff; font-weight: 600; }
    .stat-value.gold { color: #f0b429; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="logo">🔔</div>
  <div class="brand">Bang-On</div>
  <div class="tagline">Trade Smart. Win Consistently.</div>

  <!-- REGISTRATION SCREEN -->
  <div class="card" id="registerScreen">
    <div class="card-title">Welcome to Bang-On Personal</div>
    <div class="card-sub">Enter your trading capital to get personalised position sizes for every signal.</div>

    <div class="input-label">Your Trading Capital</div>
    <div class="input-wrap">
      <span class="rupee">₹</span>
      <input type="number" id="capitalInput" placeholder="500000" min="10000" />
    </div>

    <div class="risk-row">
      <span class="risk-label">Risk per trade (1%)</span>
      <span class="risk-value" id="riskDisplay">₹0</span>
    </div>

    <button class="btn btn-disabled" id="submitBtn" disabled onclick="submitCapital()">
      Get Started →
    </button>

    <div class="status" id="statusMsg"></div>
  </div>

  <!-- WELCOME BACK SCREEN -->
  <div class="welcome-card hidden" id="welcomeScreen">
    <div style="font-size:36px; margin-bottom:12px;">✅</div>
    <div class="card-title" style="margin-bottom:20px;" id="welcomeName">Welcome back!</div>

    <div class="stat-row">
      <span class="stat-label">Trading Capital</span>
      <span class="stat-value gold" id="displayCapital">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Risk per Trade</span>
      <span class="stat-value" id="displayRisk">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="displayStatus">—</span>
    </div>

    <button class="btn btn-primary" style="margin-top:24px;" onclick="showUpdateCapital()">
      Update Capital
    </button>
  </div>

  <script>
    const WEB_APP_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
    const tg          = window.Telegram.WebApp;
    tg.expand();

    const user   = tg.initDataUnsafe?.user;
    const userID = user?.id        || 'test_user';
    const name   = (user?.first_name || 'Trader') + ' ' + (user?.last_name || '');

    // ── Live risk preview ──────────────────────────────────
    document.getElementById('capitalInput').addEventListener('input', function () {
      const val  = parseInt(this.value) || 0;
      const risk = Math.round(val * 0.01);
      document.getElementById('riskDisplay').textContent =
        risk > 0 ? '₹' + risk.toLocaleString('en-IN') : '₹0';

      const btn = document.getElementById('submitBtn');
      if (val >= 10000) {
        btn.className = 'btn btn-primary';
        btn.disabled  = false;
      } else {
        btn.className = 'btn btn-disabled';
        btn.disabled  = true;
      }
    });

    // ── Check if already registered ───────────────────────
    window.onload = function () {
      fetch(WEB_APP_URL + '?action=getUser&userID=' + userID)
        .then(r => r.json())
        .then(data => {
          if (data.found) showWelcomeScreen(data);
        })
        .catch(() => {}); // first time — show register screen
    };

    // ── Submit capital ─────────────────────────────────────
    function submitCapital() {
      const capital = parseInt(document.getElementById('capitalInput').value);
      if (!capital || capital < 10000) return;

      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Saving...';
      btn.disabled    = true;

      fetch(WEB_APP_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          action:  'registerUser',
          userID:  String(userID),
          name:    name.trim(),
          capital: capital
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          showWelcomeScreen({ name: name, capital: capital, status: 'Active' });
        } else {
          showStatus('Something went wrong. Please try again.', 'error');
          btn.textContent = 'Get Started →';
          btn.disabled    = false;
        }
      })
      .catch(() => {
        showStatus('Connection error. Please try again.', 'error');
        btn.textContent = 'Get Started →';
        btn.disabled    = false;
      });
    }

    // ── Show welcome screen ────────────────────────────────
    function showWelcomeScreen(data) {
      document.getElementById('registerScreen').classList.add('hidden');
      document.getElementById('welcomeScreen').classList.remove('hidden');
      document.getElementById('welcomeName').textContent  = 'Welcome, ' + (data.name || name).split(' ')[0] + '!';
      document.getElementById('displayCapital').textContent = '₹' + Number(data.capital).toLocaleString('en-IN');
      document.getElementById('displayRisk').textContent    = '₹' + Math.round(data.capital * 0.01).toLocaleString('en-IN');
      document.getElementById('displayStatus').textContent  = data.status || 'Active';
    }

    // ── Update capital ─────────────────────────────────────
    function showUpdateCapital() {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('registerScreen').classList.remove('hidden');
      document.getElementById('submitBtn').textContent = 'Update Capital →';
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent  = msg;
      el.className    = 'status ' + type;
    }
  </script>
</body>
</html>
