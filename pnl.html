<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang-On P&L</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .logo { font-size: 24px; }
    .brand { font-size: 18px; font-weight: 700; color: #f0b429; }
    .date { font-size: 12px; color: #8899aa; margin-bottom: 20px; }

    .total-card {
      background: #1a2634;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #243447;
      text-align: center;
    }
    .total-label { font-size: 12px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .total-value { font-size: 32px; font-weight: 700; }
    .total-value.positive { color: #2ecc71; }
    .total-value.negative { color: #e74c3c; }
    .total-value.zero     { color: #8899aa; }

    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      color: #8899aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .trade-card {
      background: #1a2634;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid #243447;
    }
    .trade-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .trade-symbol { font-size: 16px; font-weight: 700; }
    .trade-tf {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .tf-intraday { background: #1a3a5c; color: #4da6ff; }
    .tf-swing    { background: #1a3a2a; color: #4dff91; }
    .tf-position { background: #3a1a2a; color: #ff4d91; }

    .trade-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .trade-label { font-size: 12px; color: #8899aa; }
    .trade-value { font-size: 12px; font-weight: 600; color: #ffffff; }
    .trade-value.green { color: #2ecc71; }
    .trade-value.red   { color: #e74c3c; }
    .trade-value.gold  { color: #f0b429; }

    .pnl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #243447;
    }
    .pnl-label { font-size: 13px; color: #8899aa; }
    .pnl-value { font-size: 16px; font-weight: 700; }
    .pnl-value.positive { color: #2ecc71; }
    .pnl-value.negative { color: #e74c3c; }
    .pnl-value.zero     { color: #8899aa; }

    .btn-close {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #f0b429;
      color: #0f1923;
      transition: opacity 0.2s;
    }
    .btn-close:active { opacity: 0.8; }
    .btn-close-disabled {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      background: #243447;
      color: #3a4f63;
      cursor: not-allowed;
      pointer-events: none;
    }

    .close-form { margin-top: 12px; display: none; }
    .close-input-wrap { position: relative; margin-bottom: 10px; }
    .rupee-sm {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #f0b429;
      font-size: 14px;
      font-weight: 600;
    }
    .close-input {
      width: 100%;
      background: #0f1923;
      border: 1px solid #243447;
      border-radius: 8px;
      padding: 10px 10px 10px 28px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      outline: none;
    }
    .close-input:focus { border-color: #f0b429; }

    .btn-confirm {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #2ecc71;
      color: #0f1923;
      transition: opacity 0.2s;
    }
    .btn-confirm:active { opacity: 0.8; }
    .btn-confirm-done {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      background: #243447;
      color: #2ecc71;
      cursor: not-allowed;
      pointer-events: none;
    }

    .close-confirm-msg {
      display: none;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 700;
      background: #1a3a2a;
      color: #2ecc71;
    }

    .empty { text-align: center; padding: 16px; color: #3a4f63; font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: #8899aa; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔔</div>
    <div class="brand">Bang-On</div>
  </div>
  <div class="date" id="dateLabel">Loading...</div>

  <div class="loading" id="loadingScreen">Loading your P&amp;L...</div>

  <div class="hidden" id="mainScreen">

    <div class="total-card">
      <div class="total-label">Total P&amp;L Today</div>
      <div class="total-value" id="totalPnl">₹0</div>
    </div>

    <div class="section">
      <div class="section-title">📂 Open Trades</div>
      <div id="openTradesList"><div class="empty">No open trades</div></div>
    </div>

    <div class="section">
      <div class="section-title">✅ Closed Trades</div>
      <div id="closedTradesList"><div class="empty">No closed trades</div></div>
    </div>

    <div class="section">
      <div class="section-title">❌ Skipped Today</div>
      <div id="skippedTradesList"><div class="empty">No skipped trades today</div></div>
    </div>

  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwCobqPswnljz2MLL7v1qyBbNQv5nr8zhc9IiEWniUvLbHMNu4kkWQaG9-nnFSbvLl66A/exec';
    const tg          = window.Telegram.WebApp;
    tg.expand();

    const user   = tg.initDataUnsafe?.user;
    const userID = user?.id ? String(user.id) : 'test_user';

    function tfClass(tf) {
      if (tf === 'INTRADAY') return 'tf-intraday';
      if (tf === 'SWING')    return 'tf-swing';
      return 'tf-position';
    }

    function pnlClass(pnl) {
      if (pnl > 0) return 'positive';
      if (pnl < 0) return 'negative';
      return 'zero';
    }

    function fmt(n) {
      return '₹' + Math.abs(n).toLocaleString('en-IN');
    }

    function fmtPnl(n) {
      return (n >= 0 ? '+' : '-') + '₹' + Math.abs(n).toLocaleString('en-IN');
    }

    window.onload = function () {
      fetch(WEB_APP_URL + '?action=getUserPnL&userID=' + encodeURIComponent(userID))
        .then(r => r.json())
        .then(data => {
          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('mainScreen').classList.remove('hidden');
          document.getElementById('dateLabel').textContent = data.today || '';
          renderAll(data);
        })
        .catch(() => {
          document.getElementById('loadingScreen').textContent = 'Failed to load. Please try again.';
        });
    };

    function renderAll(data) {
      const totalEl = document.getElementById('totalPnl');
      totalEl.textContent = fmtPnl(data.totalPnl || 0);
      totalEl.className   = 'total-value ' + pnlClass(data.totalPnl || 0);

      // Open trades
      const openEl = document.getElementById('openTradesList');
      if (data.openTrades && data.openTrades.length > 0) {
        openEl.innerHTML = data.openTrades.map(t => `
          <div class="trade-card" id="open_${t.sigID}">
            <div class="trade-header">
              <span class="trade-symbol">${t.sym}</span>
              <span class="trade-tf ${tfClass(t.tf)}">${t.tf}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Qty</span>
              <span class="trade-value gold">${t.shares} shares</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Entry</span>
              <span class="trade-value">${fmt(t.entry)}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">CMP</span>
              <span class="trade-value">${t.cmp > 0 ? fmt(t.cmp) : '—'}</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Running P&L</span>
              <span class="pnl-value ${pnlClass(t.pnl)}">${fmtPnl(t.pnl)}</span>
            </div>
            <button class="btn-close" id="closeBtn_${t.sigID}" onclick="showCloseForm('${t.sigID}')">
              📤 Close This Trade
            </button>
            <div class="close-form" id="closeForm_${t.sigID}">
              <div class="close-input-wrap">
                <span class="rupee-sm">₹</span>
                <input class="close-input" type="number" id="exitInput_${t.sigID}" placeholder="Enter exit price" />
              </div>
              <button class="btn-confirm" id="confirmBtn_${t.sigID}" onclick="confirmClose('${t.sigID}', ${t.shares}, ${t.entry})">
                Confirm Close
              </button>
              <div class="close-confirm-msg" id="closeMsg_${t.sigID}"></div>
            </div>
          </div>
        `).join('');
      } else {
        openEl.innerHTML = '<div class="empty">No open trades</div>';
      }

      // Closed trades
      const closedEl = document.getElementById('closedTradesList');
      if (data.closedTrades && data.closedTrades.length > 0) {
        closedEl.innerHTML = data.closedTrades.map(t => `
          <div class="trade-card">
            <div class="trade-header">
              <span class="trade-symbol">${t.sym}</span>
              <span class="trade-tf ${tfClass(t.tf)}">${t.tf}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Qty</span>
              <span class="trade-value gold">${t.shares} shares</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Entry</span>
              <span class="trade-value">${fmt(t.entry)}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Exit</span>
              <span class="trade-value">${fmt(t.exit)}</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Booked P&L</span>
              <span class="pnl-value ${pnlClass(t.pnl)}">${fmtPnl(t.pnl)}</span>
            </div>
          </div>
        `).join('');
      } else {
        closedEl.innerHTML = '<div class="empty">No closed trades</div>';
      }

      // Skipped trades
      const skipEl = document.getElementById('skippedTradesList');
      if (data.skippedTrades && data.skippedTrades.length > 0) {
        skipEl.innerHTML = data.skippedTrades.map(t => `
          <div class="trade-card">
            <div class="trade-header">
              <span class="trade-symbol">${t.sym}</span>
              <span class="trade-tf ${tfClass(t.tf)}">${t.tf}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Entry</span>
              <span class="trade-value">${t.entry > 0 ? fmt(t.entry) : '—'}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">CMP</span>
              <span class="trade-value">${t.cmp > 0 ? fmt(t.cmp) : '—'}</span>
            </div>
            <div class="trade-row">
              <span class="trade-label">Would have been</span>
              <span class="trade-value gold">${t.wouldShares} shares</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Missed P&L</span>
              <span class="pnl-value ${pnlClass(t.missedPnl)}">${fmtPnl(t.missedPnl)}</span>
            </div>
          </div>
        `).join('');
      } else {
        skipEl.innerHTML = '<div class="empty">No skipped trades today</div>';
      }
    }

    function showCloseForm(sigID) {
      const form = document.getElementById('closeForm_' + sigID);
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function confirmClose(sigID, shares, entry) {
      const exitPrice = parseFloat(document.getElementById('exitInput_' + sigID).value);
      if (!exitPrice || exitPrice <= 0) {
        alert('Please enter a valid exit price');
        return;
      }

      // Lock confirm button immediately
      const confirmBtn = document.getElementById('confirmBtn_' + sigID);
      confirmBtn.className   = 'btn-confirm-done';
      confirmBtn.textContent = 'Processing...';

      // Lock close button too
      const closeBtn = document.getElementById('closeBtn_' + sigID);
      if (closeBtn) {
        closeBtn.className   = 'btn-close-disabled';
        closeBtn.textContent = '📤 Closing...';
      }

      const url = WEB_APP_URL
        + '?action=closeTrade'
        + '&userID='    + encodeURIComponent(userID)
        + '&signalID='  + encodeURIComponent(sigID)
        + '&exitPrice=' + exitPrice;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const msgEl = document.getElementById('closeMsg_' + sigID);
          if (data.success) {
            const pnl = Math.round(shares * (exitPrice - entry));
            confirmBtn.textContent = '✅ Trade Closed!';
            msgEl.textContent      = 'Booked P&L: ' + fmtPnl(pnl);
            msgEl.style.display    = 'block';
            if (closeBtn) closeBtn.textContent = '✅ Closed';
            // Reload after 2 seconds
            setTimeout(() => location.reload(), 2000);
          } else {
            confirmBtn.className   = 'btn-confirm';
            confirmBtn.textContent = 'Confirm Close';
            if (closeBtn) {
              closeBtn.className   = 'btn-close';
              closeBtn.textContent = '📤 Close This Trade';
            }
            alert('Something went wrong. Please try again.');
          }
        })
        .catch(() => {
          confirmBtn.className   = 'btn-confirm';
          confirmBtn.textContent = 'Confirm Close';
          if (closeBtn) {
            closeBtn.className   = 'btn-close';
            closeBtn.textContent = '📤 Close This Trade';
          }
          alert('Connection error. Please try again.');
        });
    }
  </script>
</body>
</html>
